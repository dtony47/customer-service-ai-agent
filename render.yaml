services:
  - type: web
    name: backend
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: LOG_LEVEL
        value: info
    numInstances: 1
    plan: standard
    scaling:
      minInstances: 1
      maxInstances: 3

  - type: web
    name: frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://${{ render.project.name }}-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://${{ render.project.name }}-backend.onrender.com
    numInstances: 1
    plan: standard
    serviceIdleTimeoutMinutes: 30

  - type: postgresql
    name: postgres
    ipAllowList: []
    plan: free
    maxConnections: 20

  - type: worker
    name: background-jobs
    runtime: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
          property: connectionString
    plan: standard
    numInstances: 1
